<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>📍 GPS Sender - PAGINACABEXUDOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: #1a1a2e;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 8px;
      color: #f0c040;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* Status Card */
    .status-card {
      background: #16213e;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      text-align: center;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      vertical-align: middle;
      transition: all 0.3s;
    }
    .status-dot.connected { background: #4ade80; box-shadow: 0 0 16px #4ade8066; }
    .status-dot.disconnected { background: #f87171; box-shadow: 0 0 16px #f8717166; }
    .status-dot.sending { background: #facc15; box-shadow: 0 0 16px #facc1566; }
    .status-text {
      font-size: 0.95rem;
      font-weight: 600;
      vertical-align: middle;
    }
    .coord-display {
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      margin: 10px 0 8px;
      color: #94a3b8;
    }
    .coord-display .value {
      color: #e0e0e0;
      font-weight: 700;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .badge-active { background: #4ade8033; color: #4ade80; }
    .badge-inactive { background: #f8717133; color: #f87171; }
    .badge-warning { background: #facc1533; color: #facc15; }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }
    .info-item {
      background: #16213e;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .info-item .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.5px;
    }
    .info-item .value {
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 3px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #f0c040;
      color: #1a1a2e;
    }
    .btn-primary:hover { background: #e0b030; }
    .btn-primary:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
    }
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-secondary {
      background: #334155;
      color: #e0e0e0;
    }
    .btn-secondary:hover { background: #475569; }

    /* Server URL */
    .server-input-group {
      margin-bottom: 14px;
      position: relative;
    }
    .server-input-group label {
      font-size: 0.7rem;
      color: #64748b;
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .server-url-row {
      display: flex;
      gap: 6px;
    }
    .server-url-row input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #16213e;
      color: #e0e0e0;
      font-size: 0.8rem;
      font-family: monospace;
      outline: none;
    }
    .server-url-row input:focus {
      border-color: #f0c040;
    }
    .server-url-row .btn-sm {
      padding: 8px 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #16213e;
      color: #94a3b8;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .server-url-row .btn-sm:hover { background: #1e2a4a; }

    /* Route & Label */
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      font-size: 0.7rem;
      color: #64748b;
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group select,
    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #16213e;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
      font-family: inherit;
    }
    .input-group select:focus,
    .input-group input:focus {
      border-color: #f0c040;
    }

    /* Log */
    .log {
      margin-top: 14px;
      background: #0a0a1a;
      border-radius: 10px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.7rem;
      font-family: monospace;
      color: #64748b;
    }
    .log .entry { margin-bottom: 3px; line-height: 1.4; }
    .log .entry.error { color: #f87171; }
    .log .entry.success { color: #4ade80; }
    .log .entry.info { color: #60a5fa; }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 0.7rem;
      color: #475569;
    }

    /* Sender label badge */
    .sender-badge {
      display: inline-block;
      background: #f0c04022;
      color: #f0c040;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 6px;
    }

    @media (max-width: 400px) {
      .container { padding: 14px; }
      .info-grid { gap: 6px; }
      .info-item { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📍 GPS Sender</h1>
    <p class="subtitle">Envía tu posición en tiempo real al mapa de seguimiento</p>

    <!-- Connection Status -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span class="status-text" id="statusText">Desconectado</span>
      </div>
      <div class="coord-display" id="coordDisplay">
        Lat: <span class="value" id="latValue">--</span><br>
        Lng: <span class="value" id="lngValue">--</span>
      </div>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
        <span class="badge badge-inactive" id="gpsBadge">🛰️ GPS: Inactivo</span>
        <span class="badge badge-inactive" id="wsBadge">🔌 WS: Desconectado</span>
      </div>
      <div class="sender-badge" id="senderBadge" style="display:none;"></div>
    </div>

    <!-- Sender Label -->
    <div class="input-group">
      <label>👤 Tu nombre o identificador</label>
      <input type="text" id="senderLabel" placeholder="Ej: Migue, Ana, Carlos..." maxlength="30">
    </div>

    <!-- Route Selector -->
    <div class="input-group">
      <label>📋 Ruta / Recorrido</label>
      <select id="routeSelect">
        <option value="ruta-las-fuentes">Las Fuentes</option>
        <option value="ruta-almozara">La Almozara</option>
        <option value="ruta-rabal">El Rabal</option>
        <option value="ruta-san-pablo">San Pablo</option>
        <option value="ruta-san-jose">San José</option>
        <option value="ruta-torrero">Torrero</option>
        <option value="ruta-la-jota">La Jota</option>
        <option value="ruta-delicias">Delicias</option>
        <option value="ruta-vadorrey">Vadorrey</option>
        <option value="ruta-actur">Actur</option>
        <option value="ruta-oliver">Oliver</option>
        <option value="ruta-miralbueno">Miralbueno</option>
        <option value="ruta-santa-isabel">Santa Isabel</option>
        <option value="ruta-casablanca">Casablanca</option>
        <option value="ruta-valdespartera">Valdespartera</option>
        <option value="ruta-arcosur">Arcosur</option>
        <option value="ruta-parque-goya">Parque Goya</option>
        <option value="ruta-zalfonada">Zalfonada</option>
        <option value="ruta-montemolin">Montemolín</option>
        <option value="ruta-casetas-pueblo">Casetas</option>
        <option value="ruta-garrapinillos-pueblo">Garrapinillos</option>
        <option value="ruta-monzalbarba-pueblo">Monzalbarba</option>
        <option value="ruta-movera-pueblo">Movera</option>
        <option value="ruta-montanana-pueblo">Montañana</option>
        <option value="ruta-penaflor-pueblo">Peñaflor</option>
        <option value="ruta-sanjuan-mozarrifar-pueblo">San Juan Mozarrifar</option>
        <option value="ruta-juslibol-pueblo">Juslibol</option>
        <option value="ruta-san-gregorio-pueblo">San Gregorio</option>
        <option value="ruta-cartuja-baja-pueblo">La Cartuja Baja</option>
        <option value="ruta-alfocea-pueblo">Alfocea</option>
        <option value="ruta-torrecilla-valmadrid-pueblo">Torrecilla Valmadrid</option>
        <option value="ruta-venta-olivar-pueblo">Venta del Olivar</option>
        <option value="ruta-villarrapa-pueblo">Villarrapa</option>
        <option value="gps-live-demo">📍 GPS Live Demo</option>
      </select>
    </div>

    <!-- Server URL -->
    <div class="server-input-group">
      <label>🌐 Servidor WebSocket (IP pública del servidor)</label>
      <div class="server-url-row">
        <input type="text" id="serverUrl" placeholder="ws://192.168.1.100:3001">
        <button class="btn-sm" id="detectBtn" title="Detectar servidor automáticamente">🔍</button>
      </div>
    </div>

    <!-- Controls -->
    <button class="btn btn-primary" id="startBtn" disabled>
      ▶ Iniciar envío GPS
    </button>
    <button class="btn btn-danger" id="stopBtn" style="display:none;">
      ■ Detener envío GPS
    </button>

    <!-- Info Grid -->
    <div class="info-grid">
      <div class="info-item">
        <div class="label">Exactitud</div>
        <div class="value" id="accuracyValue">--</div>
      </div>
      <div class="info-item">
        <div class="label">Velocidad</div>
        <div class="value" id="speedValue">--</div>
      </div>
      <div class="info-item">
        <div class="label">Ruta activa</div>
        <div class="value" id="routeValue">--</div>
      </div>
      <div class="info-item">
        <div class="label">Enviados</div>
        <div class="value" id="sentCount">0</div>
      </div>
    </div>

    <!-- Log -->
    <div class="log" id="log">
      <div class="entry info">🔄 Iniciando...</div>
    </div>

    <div class="footer">
      PAGINACABEXUDOS - GPS Relay v2.0
    </div>
  </div>

  <script>
    // ============================================================
    // NOTE:
    // Errors like "ERR_CONNECTION_REFUSED" mean the phone can't reach the relay IP/port.
    // In that case, ensure firewall + that the IP is the server's reachable LAN/WAN address.
    // ============================================================

    // GPS Sender v2.0 - Mobile GPS data sender
    // ============================================================

    // DOM refs
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const latValue = document.getElementById('latValue');
    const lngValue = document.getElementById('lngValue');
    const accuracyValue = document.getElementById('accuracyValue');
    const speedValue = document.getElementById('speedValue');
    const routeValue = document.getElementById('routeValue');
    const sentCount = document.getElementById('sentCount');
    const gpsBadge = document.getElementById('gpsBadge');
    const wsBadge = document.getElementById('wsBadge');
    const senderBadge = document.getElementById('senderBadge');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const routeSelect = document.getElementById('routeSelect');
    const serverUrlInput = document.getElementById('serverUrl');
    const senderLabelInput = document.getElementById('senderLabel');
    const logEl = document.getElementById('log');
    const detectBtn = document.getElementById('detectBtn');

    // State
    let ws = null;
    let watchId = null;
    let isSending = false;
    let sendCount = 0;
    let lastLat = null;
    let lastLng = null;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_DELAY = 30000;

    // Heartbeat
    let heartbeatInterval = null;
    let lastHeartbeatResponse = Date.now();

    // ============================================================
    // Initialization
    // ============================================================

    // Get params from URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlRouteId = urlParams.get('routeId');
    if (urlRouteId) {
      for (const opt of routeSelect.options) {
        if (opt.value === urlRouteId) {
          routeSelect.value = urlRouteId;
          break;
        }
      }
    }

    const urlLabel = urlParams.get('label');
    if (urlLabel) {
      senderLabelInput.value = urlLabel;
    }

    // Auto-detect server URL
    detectServerUrl();

    routeValue.textContent = routeSelect.value;

    // ============================================================
    // Auto-detect server IP
    // ============================================================

    function detectServerUrl() {
      // Try to get server IP from the current page
      const hostname = window.location.hostname;
      if (hostname && hostname !== 'localhost' && hostname !== '127.0.0.1') {
        // If server is reachable from the phone via HTTP/IP, it should be reachable by WS too.
        // Use port from the URL origin if present; fallback to 3001.
        const port = window.location.port && window.location.port.trim() !== '' ? window.location.port : '3001';
        const detected = `ws://${hostname}:${port}`;
        serverUrlInput.value = detected;

        log(`🔍 Servidor detectado: ${detected}`, 'info');

        // Auto-connect after detection
        setTimeout(connectWebSocket, 500);
      } else {
        // If local, show placeholder
        serverUrlInput.placeholder = 'ws://IP_DEL_SERVIDOR:3001';
        log('💡 Introduce la IP del servidor (ej: ws://192.168.1.100:3001)', 'info');
      }
    }

    detectBtn.addEventListener('click', () => {
      detectServerUrl();
      if (ws) disconnectWebSocket();
      setTimeout(connectWebSocket, 500);
    });

    // ============================================================
    // Logging
    // ============================================================

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ============================================================
    // WebSocket connection
    // ============================================================

    function connectWebSocket() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      const serverUrl = serverUrlInput.value.trim();
      if (!serverUrl) {
        log('❌ Introduce la URL del servidor WebSocket (IP pública o local)', 'error');
        startBtn.disabled = true;
        return;
      }

      // Validate URL format
      if (!serverUrl.startsWith('ws://') && !serverUrl.startsWith('wss://')) {
        log('❌ La URL debe empezar con ws:// o wss://', 'error');
        return;
      }

      const routeId = routeSelect.value;
      const label = senderLabelInput.value.trim() || 'Sin nombre';
      const senderId = 'sender-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);

      const fullUrl = `${serverUrl}?role=sender&routeId=${routeId}&label=${encodeURIComponent(label)}&senderId=${senderId}`;

      log(`🔌 Conectando a ${serverUrl}...`, 'info');
      startBtn.disabled = true;
      startBtn.textContent = '⏳ Conectando...';

      try {
        ws = new WebSocket(fullUrl);

        ws.onopen = () => {
          log('✅ Conectado al servidor GPS Relay', 'success');
          updateConnectionStatus('connected');
          wsBadge.className = 'badge badge-active';
          wsBadge.textContent = '🔌 WS: Conectado';
          startBtn.disabled = false;
          startBtn.textContent = '▶ Iniciar envío GPS';
          reconnectAttempts = 0;

          // Show sender badge
          senderBadge.style.display = 'inline-block';
          senderBadge.textContent = `👤 ${label}`;

          // Start heartbeat
          startHeartbeat();
        };

        ws.onclose = (event) => {
          log(`❌ Desconectado del servidor (código: ${event.code})`, 'error');
          updateConnectionStatus('disconnected');
          wsBadge.className = 'badge badge-inactive';
          wsBadge.textContent = '🔌 WS: Desconectado';
          startBtn.disabled = true;
          stopSending();
          stopHeartbeat();
          scheduleReconnect();
        };

        ws.onerror = () => {
          log('⚠️ Error de conexión WebSocket', 'error');
          wsBadge.className = 'badge badge-inactive';
          wsBadge.textContent = '🔌 WS: Error';
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);

            if (data.type === 'room_info') {
              log(`📡 Sala "${data.routeId}": ${data.sendersCount} emisor(es), ${data.receiversCount} receptor(es)`, 'success');
            } else if (data.type === 'pong') {
              lastHeartbeatResponse = Date.now();
            } else if (data.type === 'server_shutdown') {
              log('🛑 El servidor se está cerrando', 'error');
              disconnectWebSocket();
            }
          } catch {}
        };
      } catch (err) {
        log(`❌ Error al conectar: ${err.message}`, 'error');
        startBtn.disabled = true;
        scheduleReconnect();
      }
    }

    function disconnectWebSocket() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      stopHeartbeat();
      if (ws) {
        ws.onclose = null;
        ws.onerror = null;
        ws.onmessage = null;
        ws.close();
        ws = null;
      }
      updateConnectionStatus('disconnected');
      wsBadge.className = 'badge badge-inactive';
      wsBadge.textContent = '🔌 WS: Desconectado';
      startBtn.disabled = true;
      senderBadge.style.display = 'none';
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectAttempts++;
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
      log(`🔄 Reconectando en ${Math.round(delay / 1000)}s... (intento ${reconnectAttempts})`, 'info');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectWebSocket();
      }, delay);
    }

    function updateConnectionStatus(status) {
      statusDot.className = `status-dot ${status}`;
      const labels = {
        connected: 'Conectado',
        sending: 'Enviando GPS...',
        disconnected: 'Desconectado',
      };
      statusText.textContent = labels[status] || 'Desconectado';
    }

    // ============================================================
    // Heartbeat
    // ============================================================

    function startHeartbeat() {
      stopHeartbeat();
      lastHeartbeatResponse = Date.now();
      heartbeatInterval = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          // If no response for 15s, reconnect
          if (Date.now() - lastHeartbeatResponse > 15000) {
            log('💔 Heartbeat perdido, reconectando...', 'error');
            disconnectWebSocket();
            connectWebSocket();
            return;
          }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 10000);
    }

    function stopHeartbeat() {
      if (heartbeatInterval) {
        clearInterval(heartbeatInterval);
        heartbeatInterval = null;
      }
    }

    // ============================================================
    // GPS Tracking
    // ============================================================

    function startSending() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('❌ Esperando conexión WebSocket...', 'error');
        return;
      }

      if (!navigator.geolocation) {
        log('❌ Este dispositivo no soporta GPS', 'error');
        return;
      }

      // Request permission explicitly on iOS
      if (navigator.permissions && navigator.permissions.query) {
        navigator.permissions.query({ name: 'geolocation' }).then(result => {
          if (result.state === 'denied') {
            log('⚠️ Permiso GPS denegado. Actívalo en Ajustes > Privacidad > Localización', 'error');
          }
        }).catch(() => {});
      }

      isSending = true;
      startBtn.style.display = 'none';
      stopBtn.style.display = 'block';
      updateConnectionStatus('sending');
      gpsBadge.className = 'badge badge-active';
      gpsBadge.textContent = '🛰️ GPS: Activo';
      log('🛰️ Iniciando captura GPS en tiempo real...', 'info');

      const geoOptions = {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 2000,
      };

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          const { latitude, longitude, accuracy, speed, heading, altitude } = position.coords;
          lastLat = latitude;
          lastLng = longitude;

          // Update UI
          latValue.textContent = latitude.toFixed(6);
          lngValue.textContent = longitude.toFixed(6);
          accuracyValue.textContent = accuracy ? `${Math.round(accuracy)}m` : '--';
          speedValue.textContent = speed !== null && speed !== undefined
            ? `${(speed * 3.6).toFixed(1)} km/h`
            : '--';

          // Send to server
          if (ws && ws.readyState === WebSocket.OPEN) {
            const message = JSON.stringify({
              type: 'gps',
              lat: latitude,
              lng: longitude,
              accuracy: accuracy || 0,
              speed: speed || 0,
              heading: heading || 0,
              altitude: altitude || 0,
            });
            ws.send(message);
            sendCount++;
            sentCount.textContent = sendCount;
          }
        },
        (error) => {
          let msg = 'Error GPS desconocido';
          switch (error.code) {
            case error.PERMISSION_DENIED:
              msg = 'Permiso denegado. Activa la localización en Ajustes.';
              break;
            case error.POSITION_UNAVAILABLE:
              msg = 'GPS no disponible. ¿Estás en interior?';
              break;
            case error.TIMEOUT:
              msg = 'Tiempo de espera agotado. Buscando señal...';
              break;
          }
          log(`⚠️ ${msg}`, 'error');
          gpsBadge.className = 'badge badge-warning';
          // If permission denied, we can't send GPS. Keep WS but wait for user to enable it.

          gpsBadge.textContent = '🛰️ GPS: Error';
        },
        geoOptions
      );

      log('📡 GPS activado. Enviando posición en tiempo real al mapa...', 'success');
    }

    function stopSending() {
      isSending = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      updateConnectionStatus('connected');
      gpsBadge.className = 'badge badge-inactive';
      gpsBadge.textContent = '🛰️ GPS: Inactivo';
      log('⏹️ Envío GPS detenido', 'info');
    }

    // ============================================================
    // Event listeners
    // ============================================================

    startBtn.addEventListener('click', startSending);
    stopBtn.addEventListener('click', stopSending);

    routeSelect.addEventListener('change', () => {
      const routeId = routeSelect.value;
      routeValue.textContent = routeId;
      log(`📋 Ruta cambiada a: ${routeId}`, 'info');

      // Reconnect with new route
      if (ws) {
        disconnectWebSocket();
        setTimeout(connectWebSocket, 500);
      }
    });

    senderLabelInput.addEventListener('change', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const label = senderLabelInput.value.trim() || 'Sin nombre';
        ws.send(JSON.stringify({ type: 'update_label', label }));
        senderBadge.textContent = `👤 ${label}`;
        log(`👤 Nombre actualizado: ${label}`, 'info');
      }
    });

    serverUrlInput.addEventListener('change', () => {
      if (ws) {
        disconnectWebSocket();
        setTimeout(connectWebSocket, 500);
      }
    });

    // ============================================================
    // Handle page lifecycle
    // ============================================================

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isSending) {
        log('💤 App en segundo plano, GPS continúa...', 'info');
      } else if (!document.hidden && isSending) {
        log('🔛 App visible de nuevo', 'info');
      }
    });

    // Keep screen awake while sending (if API available)
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator && isSending) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {});
          log('🔒 Pantalla activa bloqueada', 'info');
        }
      } catch {}
    }

    document.addEventListener('click', () => {
      if (isSending) requestWakeLock();
    });

    window.addEventListener('beforeunload', () => {
      stopSending();
      disconnectWebSocket();
    });

    // ============================================================
    // Auto-connect
    // ============================================================

    // If we have a server URL from detection, auto-connect
    if (serverUrlInput.value) {
      setTimeout(connectWebSocket, 1000);
    } else {
      log('💡 Introduce la IP del servidor (ej: ws://MIDIREccionIP:3001) y pulsa Conectar', 'info');
    }
  </script>
</body>
</html>
