# =============================================================================
# PAGINACABEXUDOS - Production Docker Compose
# =============================================================================
#
# Deploys the full application (React frontend + GPS Relay WebSocket) on a single server.
#
# Usage:
#   docker-compose up -d              # Start all services
#
# Environment file (.env):
#   PORT=3001
#   LOG_LEVEL=info
#   AUTHORIZED_GPS_DEVICES={"cmp_prueba_barrio": true}
# =============================================================================

services:
  # ===========================================================================
  # Full Application - React frontend + GPS Relay WebSocket
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paginacabexudos
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGIN=*
      - CLEANUP_INTERVAL=60000
      - ROOM_IDLE_TTL=300000
      - AUTHORIZED_GPS_DEVICES=${AUTHORIZED_GPS_DEVICES:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - paginacabexudos-net

networks:
  paginacabexudos-net:
    driver: bridge
