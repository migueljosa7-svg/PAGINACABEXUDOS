services:
  - type: web
    name: paginacabexudos
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
      - key: AUTHORIZED_GPS_DEVICES
        value: '{"cmp_prueba_barrio": true}'
    healthCheckPath: /health
    autoDeploy: true